name: Cleanup ETB admin files

on:
  push:
    branches:
      - standardize-etb-unit-style

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Restore admin files from main and remove temporary workflow
        run: |
          git fetch origin main
          git checkout origin/main -- src/routes/_app/admin.tsx src/routes/_app/admin-earnings.tsx
          rm -f .github/workflows/cleanup-etb-admin.yml
          git config user.name "qhash-etb-bot"
          git config user.email "qhash-etb-bot@users.noreply.github.com"
          git add src/routes/_app/admin.tsx src/routes/_app/admin-earnings.tsx .github/workflows/cleanup-etb-admin.yml
          if git diff --cached --quiet; then
            echo "No cleanup changes."
            exit 0
          fi
          git commit -m "Keep ETB unit styling scoped to user pages"
          git push
