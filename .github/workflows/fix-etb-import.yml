name: Fix ETB unit import

on:
  push:
    branches:
      - standardize-etb-unit-style

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fix withdraw import and remove temporary workflow
        run: |
          python <<'PY'
          from pathlib import Path
          path = Path('src/routes/_app/withdraw.tsx')
          text = path.read_text()
          if 'CurrencyUnit' not in text.split('import { useCallback')[0]:
              text = text.replace('import { Input } from "@/components/ui/Input.js";\n', 'import { Input } from "@/components/ui/Input.js";\nimport { CurrencyUnit } from "@/components/ui/AmountText.js";\n')
          path.write_text(text)
          Path('.github/workflows/fix-etb-import.yml').unlink(missing_ok=True)
          PY
          git config user.name "qhash-etb-bot"
          git config user.email "qhash-etb-bot@users.noreply.github.com"
          git add src/routes/_app/withdraw.tsx .github/workflows/fix-etb-import.yml
          if git diff --cached --quiet; then
            echo "No import fix needed."
            exit 0
          fi
          git commit -m "Fix ETB unit import"
          git push
