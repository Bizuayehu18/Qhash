name: Standardize ETB unit style

on:
  push:
    branches:
      - standardize-etb-unit-style

permissions:
  contents: write

jobs:
  update-etb-style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply ETB unit styling updates
        run: |
          python <<'PY'
          from pathlib import Path

          UNIT = '<CurrencyUnit />'
          UNIT_MUTED = '<CurrencyUnit className="text-gray-600" />'
          UNIT_BALANCE = '<CurrencyUnit className="ml-1.5 text-[0.48em]" />'

          def read(path):
              return Path(path).read_text()

          def write(path, text):
              Path(path).write_text(text)

          def ensure_import(text, from_import, name):
              if name in text:
                  return text
              return text.replace(from_import, from_import.replace(' }', f', {name} }}'))

          def replace(text, old, new):
              if old in text:
                  return text.replace(old, new)
              return text

          # Dashboard
          path = 'src/routes/_app/dashboard.tsx'
          text = read(path)
          text = ensure_import(text, 'import { AmountText } from "@/components/ui/AmountText.js";', 'CurrencyUnit')
          text = replace(text, 'function formatDashboardEtb(value: number) {\n  return `${formatDashboardAmount(value)} ETB`;\n}', 'function DashboardEtb({ value }: { value: number }) {\n  return (\n    <>\n      {formatDashboardAmount(value)}\n      <CurrencyUnit />\n    </>\n  );\n}')
          text = replace(text, 'value={formatDashboardEtb(incomeSummary?.todayTotalIncome ?? 0)}', 'value={<DashboardEtb value={incomeSummary?.todayTotalIncome ?? 0} />}')
          text = replace(text, 'value={formatDashboardEtb(incomeSummary?.totalIncome ?? 0)}', 'value={<DashboardEtb value={incomeSummary?.totalIncome ?? 0} />}')
          text = replace(text, '<span className="ml-1.5 text-sm font-normal text-gray-500">ETB</span>', UNIT_BALANCE)
          text = replace(text, '{formatDashboardAmount(inv.daily_earning)} ETB/day · {roundedProgress}% complete', '{formatDashboardAmount(inv.daily_earning)} <CurrencyUnit className="text-gray-600" />/day · {roundedProgress}% complete')
          text = replace(text, '<span className="text-[9px] font-normal text-gray-500">ETB</span>', UNIT)
          write(path, text)

          # Plans
          path = 'src/routes/_app/plans.tsx'
          text = read(path)
          if 'CurrencyUnit' not in text:
              text = text.replace('import { Badge } from "@/components/ui/Badge.js";', 'import { Badge } from "@/components/ui/Badge.js";\nimport { CurrencyUnit } from "@/components/ui/AmountText.js";')
          text = replace(text, '<span className="text-[9px] font-normal text-gray-500">ETB</span>', UNIT)
          text = replace(text, '<span className="text-[10px] font-normal text-gray-500">ETB</span>', UNIT)
          text = replace(text, '<span className="text-[0.8em] font-normal text-gray-500">ETB</span>', UNIT)
          write(path, text)

          # Deposit
          path = 'src/routes/_app/deposit.tsx'
          text = read(path)
          text = replace(text, 'import { useCallback, useEffect, useMemo, useRef, useState } from "react";', 'import { useCallback, useEffect, useMemo, useRef, useState, type ReactNode } from "react";')
          if 'CurrencyUnit' not in text:
              text = text.replace('import { SectionHeader } from "@/components/ui/SectionHeader.js";', 'import { SectionHeader } from "@/components/ui/SectionHeader.js";\nimport { CurrencyUnit } from "@/components/ui/AmountText.js";')
          if 'function DepositAmountText' not in text:
              text = replace(text, 'function formatAmount(value: number): string {\n  return value.toLocaleString("en-US", {\n    minimumFractionDigits: 2,\n    maximumFractionDigits: 2,\n  });\n}\n', 'function formatAmount(value: number): string {\n  return value.toLocaleString("en-US", {\n    minimumFractionDigits: 2,\n    maximumFractionDigits: 2,\n  });\n}\n\nfunction DepositAmountText({ value, prefix = "" }: { value: number; prefix?: string }) {\n  return (\n    <>\n      {prefix}{formatAmount(value)}\n      <CurrencyUnit />\n    </>\n  );\n}\n')
          text = replace(text, 'const amountText = isRejected', 'const amountText: ReactNode = isRejected')
          text = replace(text, '? `+${formatAmount(deposit.amount)} ETB`', '? <DepositAmountText value={deposit.amount} prefix="+" />')
          text = replace(text, '? `${formatAmount(deposit.amount)} ETB`', '? <DepositAmountText value={deposit.amount} />')
          write(path, text)

          # Withdraw
          path = 'src/routes/_app/withdraw.tsx'
          text = read(path)
          if 'CurrencyUnit' not in text:
              text = text.replace('import { SectionHeader } from "@/components/ui/SectionHeader.js";', 'import { SectionHeader } from "@/components/ui/SectionHeader.js";\nimport { CurrencyUnit } from "@/components/ui/AmountText.js";')
          text = replace(text, '<span className="ml-1 text-[10px] font-semibold text-gray-500">ETB</span>', '<CurrencyUnit className="font-semibold" />')
          if 'function EtbAmount' not in text:
              text = replace(text, 'function SummaryRow({', 'function EtbAmount({ value, prefix = "" }: { value: number; prefix?: string }) {\n  return (\n    <>\n      {prefix}{formatMoney(value)}\n      <CurrencyUnit />\n    </>\n  );\n}\n\nfunction SummaryRow({')
          text = replace(text, 'value={`${formatMoney(parsedAmount)} ETB`}', 'value={<EtbAmount value={parsedAmount} />}')
          text = replace(text, 'value={`${formatMoney(feeAmount)} ETB`}', 'value={<EtbAmount value={feeAmount} />}')
          text = replace(text, 'value={`${formatMoney(netAmount)} ETB`}', 'value={<EtbAmount value={netAmount} />}')
          text = replace(text, 'value={`${formatMoney(amount)} ETB`}', 'value={<EtbAmount value={amount} />}')
          text = replace(text, 'value={`${formatMoney(fee)} ETB`}', 'value={<EtbAmount value={fee} />}')
          text = replace(text, 'value={`${formatMoney(net)} ETB`}', 'value={<EtbAmount value={net} />}')
          text = replace(text, 'value: string;', 'value: React.ReactNode;')
          text = replace(text, '{isRejected ? "Rejected" : `-${formatMoney(withdrawal.amount)} ETB`}', '{isRejected ? "Rejected" : <EtbAmount value={withdrawal.amount} prefix="-" />}')
          write(path, text)

          # Referrals
          path = 'src/routes/_app/referrals.tsx'
          text = read(path)
          if 'CurrencyUnit' not in text:
              text = text.replace('import { Badge } from "@/components/ui/Badge.js";', 'import { Badge } from "@/components/ui/Badge.js";\nimport { CurrencyUnit } from "@/components/ui/AmountText.js";')
          text = replace(text, 'value={formatEtb(stats.todayRewards)}', 'value={<EtbValue value={stats.todayRewards} />}')
          text = replace(text, 'value={formatEtb(stats.earned)}', 'value={<EtbValue value={stats.earned} />}')
          text = replace(text, 'value: string;', 'value: ReactNode;')
          text = replace(text, 'function formatEtb(value: number): string {\n  const amount = Number.isFinite(value) ? value : 0;\n  return `${amount.toFixed(2)} ETB`;\n}', 'function EtbValue({ value }: { value: number }) {\n  const amount = Number.isFinite(value) ? value : 0;\n\n  return (\n    <>\n      {amount.toFixed(2)}\n      <CurrencyUnit />\n    </>\n  );\n}')
          write(path, text)

          # Admin-facing money displays, kept to display-only styling.
          for path in ['src/routes/_app/admin.tsx', 'src/routes/_app/admin-earnings.tsx']:
              text = read(path)
              if 'CurrencyUnit' not in text:
                  anchor = 'import { Badge } from "@/components/ui/Badge.js";'
                  if anchor in text:
                      text = text.replace(anchor, anchor + '\nimport { CurrencyUnit } from "@/components/ui/AmountText.js";')
              text = replace(text, '} ETB`', '} `')
              text = replace(text, '} ETB</p>', '}<CurrencyUnit /></p>')
              text = replace(text, '} ETB</span>', '}<CurrencyUnit /></span>')
              text = replace(text, ')} ETB`', ')} `')
              write(path, text)

          # Landing page and ActivityFeed were already updated directly; keep workflow out of final PR diff.
          Path('.github/workflows/standardize-etb-unit-style.yml').unlink(missing_ok=True)
          PY
      - name: Commit generated changes
        run: |
          git config user.name "qhash-etb-bot"
          git config user.email "qhash-etb-bot@users.noreply.github.com"
          git add src .github/workflows/standardize-etb-unit-style.yml
          if git diff --cached --quiet; then
            echo "No generated ETB style changes."
            exit 0
          fi
          git commit -m "Standardize ETB unit styling across pages"
          git push
