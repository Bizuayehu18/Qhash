name: Remove CurrencyUnit literal spaces

on:
  push:
    branches:
      - standardize-etb-unit-style

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Remove literal spaces before CurrencyUnit
        run: |
          python <<'PY'
          from pathlib import Path

          for path in [Path('src/routes/_app/dashboard.tsx'), Path('src/routes/_app/plans.tsx')]:
              text = path.read_text()
              text = text.replace('} <CurrencyUnit', '}<CurrencyUnit')
              path.write_text(text)

          Path('.github/workflows/remove-currency-unit-spaces.yml').unlink(missing_ok=True)
          PY
          git config user.name "qhash-etb-bot"
          git config user.email "qhash-etb-bot@users.noreply.github.com"
          git add src/routes/_app/dashboard.tsx src/routes/_app/plans.tsx .github/workflows/remove-currency-unit-spaces.yml
          if git diff --cached --quiet; then
            echo "No CurrencyUnit space cleanup changes."
            exit 0
          fi
          git commit -m "Remove literal spaces before ETB units"
          git push
